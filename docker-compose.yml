x-defaults: &defaults
  environment:
    USERID: "1000"
    GROUPID: "1000"
    CADDY_USER: "admin"
    CADDY_HASH: ${CADDY_HASH}

services:

  base-ubuntu-22:
    image: base-ubuntu-22:latest
    build: ./base-ubuntu-22
    profiles: ["base"]

  base-ubuntu-24:
    image: base-ubuntu-24:latest
    build: ./base-ubuntu-24
    profiles: ["base"]

  base-ubuntu-caddy-22:
    image: base-ubuntu-caddy-22:latest
    build: ./base-ubuntu-caddy-22
    profiles: ["base"]

  base-ubuntu-caddy-24:
    image: base-ubuntu-caddy-24:latest
    build: ./base-ubuntu-caddy-24
    profiles: ["base"]

  base-ubuntu-gui-22:
    image: base-ubuntu-gui-22:latest
    build: ./base-ubuntu-gui-22
    profiles: ["base"]

  base-ubuntu-gui-24:
    image: base-ubuntu-gui-24:latest
    build: ./base-ubuntu-gui-24
    profiles: ["base"]

  base-ubuntu-kde-24:
    image: base-ubuntu-kde-24:latest
    build: ./base-ubuntu-kde-24
    profiles: ["base"]

  base-ubuntu-kde-wine-24:
    image: base-ubuntu-kde-wine-24:latest
    build: ./base-ubuntu-kde-wine-24
    profiles: ["base"]

  base-ubuntu-wine-24:
    image: base-ubuntu-wine-24:latest
    build: ./base-ubuntu-wine-24
    profiles: ["base"]

  base-ubuntu-xfce-22:
    image: base-ubuntu-xfce-22:latest
    build: ./base-ubuntu-xfce-22
    profiles: ["base"]

  base-ubuntu-xfce-24:
    image: base-ubuntu-xfce-24:latest
    build: ./base-ubuntu-xfce-24
    profiles: ["base"]

  calibre:
    build: ./calibre
    image: calibre:latest
    volumes:
      - calibre-home:/home/runuser
      - ${CALIBRE_LIBRARY}:/library
      - ${CALIBRE_SOURCE}:/source
    ports:
      - "9001:8081"
      - "9002:8083"
    <<: *defaults
    container_name: calibre-c

  clrmamepro:
    build: ./clrmamepro
    image: clrmamepro:latest
    volumes:
      - clrmamepro-home:/home/runuser
      - clrmamepro-app:/app
      - /mnt:/host_mnt
      - /media:/host_media
    ports:
      - "9003:8081"
    <<: *defaults
    container_name: clrmamepro-c

  desktop-kde:
    build: ./desktop-kde
    image: desktop-kde:latest
    volumes:
      - kde-home:/home/runuser
      - /mnt:/host_volumes
    ports:
      - "9024:8081"
    <<: *defaults
    container_name: kde-c

  desktop-xfce:
    build: ./desktop-xfce
    image: desktop-xfce:latest
    volumes:
      - desktop-xfce-home:/home/runuser
      - /mnt:/host_volumes
    ports:
      - "9026:8081"
    <<: *defaults
    container_name: desktop-xfce-c

  double-commander:
    build: ./double-commander
    image: double-commander:latest
    volumes:
      - double-commander-home:/home/runuser
      - /mnt:/host_volumes
    ports:
      - "9004:8081"
    <<: *defaults
    container_name: double-commander-c

  dropbox-gui:
    build: ./dropbox-gui
    image: dropbox-gui:latest
    volumes:
      - dropbox-gui-home:/home/runuser
      - ${DROPBOX_FOLDER}:/home/runuser/Dropbox
    ports:
      - "9005:8081"
    <<: *defaults
    container_name: dropbox-gui-c

  exodos:
    build: ./exodos
    image: exodos:latest
    volumes:
      - exodos-home:/home/runuser
      - /mnt:/host_volumes
    ports:
      - "9027:8081"
    privileged: true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    <<: *defaults
    container_name: exodos-c

  expressvpn:
    build: ./expressvpn
    image: expressvpn:latest
    container_name: expressvpn-c
    cap_add:
      - NET_ADMIN
    devices: 
      - /dev/net/tun
    stdin_open: true
    tty: true
    command: /bin/bash
    privileged: true
    restart: unless-stopped
    ports:
      - 9092:9091

  filezilla:
    build: ./filezilla
    image: filezilla:latest
    volumes:
      - filezilla-home:/home/runuser
      - /mnt:/host_volumes
    ports:
      - "9006:8081"
    <<: *defaults
    container_name: filezilla-c

  gdmenu-cm:
    build: ./gdmenu-cm
    image: gdmenu-cm:latest
    volumes:
      - gdmenu-cm-home:/home/runuser
      - build-gdmenu-cm-app:/app
      - /mnt:/host_volumes
      # The following variable was populed in the Makefile using this line at the top:
      # EXT_VOLUMES_MAPPING := $(shell ./get_ext_volumes_map.sh nas runuser)
      # - ${EXT_VOLUMES_MAPPING}
    ports:
      - "9007:8081"
    <<: *defaults
    container_name: gdmenu-cm-c

  hexchat:
    build: ./hexchat
    image: hexchat:latest
    volumes:
      - hexchat-home:/home/runuser
    ports:
      - "9008:8081"
    <<: *defaults
    container_name: hexchat-c

  inkscape:
    build: ./inkscape
    image: inkscape:latest
    volumes:
      - inkscape-home:/home/runuser
      - ${LASER_CUTTING_ROOT}:/lasercutting
    ports:
      - "9009:8081"
    <<: *defaults
    container_name: inkscape-c

  jrom-manager:
    build: ./jrom-manager
    image: jrom-manager:latest
    volumes:
      - jrom-manager-home:/home/runuser
      - /mnt:/host_volumes
    ports:
      - "9011:8081"
    <<: *defaults
    container_name: jrom-manager-c

  laserweb:
    build: ./laserweb
    image: laserweb:latest
    volumes:
      - laserweb-home:/home/runuser
      - ${LASER_CUTTING_ROOT}:/lasercutting
    ports:
      - "9010:8081"
    privileged: true
    <<: *defaults
    container_name: laserweb-c

  lightburn:
    build: ./lightburn
    image: lightburn:latest
    volumes:
      - lightburn-home:/home/runuser
      - ${LASER_CUTTING_ROOT}:/lasercutting
    ports:
      - "9012:8081"
    privileged: true
    <<: *defaults
    container_name: lightburn-c

  lightburn-win-install:
    build: ./lightburn-win-install
    image: lightburn-win-install:latest
    volumes:
      - lightburn-win-home:/home/runuser
      - ${LASER_CUTTING_ROOT}:/lasercutting
    ports:
      - "9013:8081"
    privileged: true
    <<: *defaults
    container_name: lightburn-win-install-c

  lightburn-win:
    build: ./lightburn-win
    image: lightburn-win:latest
    volumes:
      - lightburn-win-home:/home/runuser
      - ${LASER_CUTTING_ROOT}:/lasercutting
    ports:
      - "9014:8081"
    privileged: true
    <<: *defaults
    container_name: lightburn-win-c

  lasergrbl-install:
    build: ./lasergrbl-install
    image: lasergrbl-install:latest
    volumes:
      - lasergrbl-home:/home/runuser
    ports:
      - "9015:8081"
    privileged: true
    <<: *defaults
    container_name: lasergrbl-install-c

  lasergrbl:
    build: ./lasergrbl
    image: lasergrbl:latest
    volumes:
      - lasergrbl-home:/home/runuser
      - ${LASER_CUTTING_ROOT}:/lasercutting
    ports:
      - "9016:8081"
    privileged: true
    <<: *defaults
    container_name: lasergrbl-c

  meganz:
    build: ./meganz
    image: meganz:latest
    env_file:
      - .env
    volumes:
      - meganz-home:/home/runuser
      - ${MEGANZ_LOCAL}:/meganz_local
    ports:
      - "9017:8081"
    container_name: meganz-c

  nkit:
    build: ./nkit
    image: nkit:latest
    volumes:
      - nkit-home:/home/runuser
      - nkit-app:/app
      - /mnt:/host_mnt
      - /media:/host_media
    ports:
      - "9018:8081"
    <<: *defaults
    container_name: nkit-c

  octoprint:
    build: ./octoprint
    image: octoprint:latest
    volumes:
      - octoprint-app:/octoprint
      - octoprint-home:/home-runuser
      - /dev:/dev
    ports:
      - "9019:80"
    environment:
      ENABLE_MJPG_STREAMER: "true"
    privileged: true
    container_name: octoprint-c

  retroarch-web:
    build: ./retroarch-web
    image: retroarch-web:latest
    volumes:
      - retroarch-web-home:/home/runuser
    ports:
      - "9020:8081"
    <<: *defaults
    container_name: retroarch-web-c

  simple-arcade-multifilter:
    build: ./simple-arcade-multifilter
    image: simple-arcade-multifilter:latest
    volumes:
      - simple-arcade-multifilter-home:/home/runuser
      - simple-arcade-multifilter-app:/app
      - /mnt:/host_mnt
      - /media:/host_media
    ports:
      - "9021:8081"
    <<: *defaults
    container_name: simple-arcade-multifilter-c

  transmission:
    build:
      context: ./transmission
      args:
        TRANSMISSION_PASSWORD: ${TRANSMISSION_PASSWORD}
    image: transmission:latest
    volumes:
      - transmission-home:/home/runuser
      - /mnt:/host_volumes
    ports:
      - "9091:9091"
      - "51413:51413"
    <<: *defaults
    container_name: transmission-c

  webdav-apache:
    build:
      context: ./webdav-apache
      args:
        - WEBDAV_USERNAME=${WEBDAV_USERNAME:-webdav}
        - WEBDAV_PASSWORD=${WEBDAV_PASSWORD:-password}
    image: webdav-apcahe:latest
    ports:
      - "9023:80"
    volumes:
      - webdav-apache-home:/home/runuser
      - "${WEBDAV_ROOT}:/var/www/html/webdav"
    container_name: webdav-apache-c

  webdav:
    build: ./webdav
    image: webdav:latest
    volumes:
      - webdav-home:/home/runuser
      - "${WEBDAV_ROOT}:/webdav"
    ports:
      - "9022:8081"
    <<: *defaults
    container_name: webdav-c

volumes:
  calibre-home:
  clrmamepro-home:
  clrmamepro-app:
  desktop-xfce-home:
  double-commander-home:
  dropbox-gui-home:
  exodos-home:
  filezilla-home:
  gdmenu-cm-home:
  build-gdmenu-cm-app:
  hexchat-home:
  jrom-manager-home:
  kde-home:
  inkscape-home:
  laserweb-home:
  lightburn-home:
  lightburn-win-home:
  lasergrbl-home:
  meganz-home:
  nkit-home:
  nkit-app:
  octoprint-app:
  octoprint-home:
  retroarch-web-home:
  simple-arcade-multifilter-home:
  simple-arcade-multifilter-app:
  transmission-home:
  webdav-apache-home:
  webdav-home:
  xfce-vpn-home:


  
